<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora TMDb - R$ 0,45/min</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header class="hero">
      <h1>Calculadora de filmes e séries</h1>
      <p>Pesquise no TMDb, puxe a minutagem automaticamente e calcule usando <strong>R$ 0,45/min</strong>.</p>
    </header>

    <section class="card settings-card">
      <div class="grid two-cols">
        <label>
          <span>Chave da API TMDb (v3)</span>
          <input id="apiKey" type="password" placeholder="Cole sua API key aqui" />
        </label>

        <label>
          <span>Valor por minuto (R$)</span>
          <input id="pricePerMinute" type="number" min="0" step="0.01" value="0.45" />
        </label>
      </div>
      <div class="actions">
        <button id="saveSettingsBtn">Salvar configurações</button>
        <button id="clearSettingsBtn" class="secondary">Apagar chave salva</button>
      </div>
      <p class="muted small">A chave é salva apenas no seu navegador usando localStorage.</p>
    </section>

    <section class="card search-card">
      <div class="grid search-grid">
        <label>
          <span>Tipo</span>
          <select id="mediaType">
            <option value="multi">Filme + Série</option>
            <option value="movie">Somente Filme</option>
            <option value="tv">Somente Série</option>
          </select>
        </label>

        <label>
          <span>Título</span>
          <input id="searchInput" type="text" placeholder="Ex.: From, Titanic, Breaking Bad" />
        </label>

        <label>
          <span>&nbsp;</span>
          <button id="searchBtn">Pesquisar</button>
        </label>
      </div>
      <p id="status" class="status"></p>
    </section>

    <section id="resultsSection" class="card hidden">
      <h2>Resultados</h2>
      <div id="results" class="results"></div>
    </section>

    <section id="detailsSection" class="card hidden">
      <div id="details"></div>
    </section>

    <footer class="footer">
      <p>Este produto usa a API TMDb, mas não é endossado nem certificado pela TMDb.</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
